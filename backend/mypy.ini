[mypy]
python_version = 3.12
pretty = True
show_error_codes = True
warn_unused_configs = True
warn_return_any = False
warn_unused_ignores = False
no_implicit_optional = True
check_untyped_defs = True
disallow_untyped_defs = False
ignore_missing_imports = True
exclude = (?x)(
    ^tests/
    | ^alembic/
  )

[mypy-rank_bm25.*]
ignore_missing_imports = True

[mypy-fitz.*]
ignore_missing_imports = True

[mypy-slowapi.*]
ignore_missing_imports = True

# Pre-existing typing debt in service/router surfaces (not introduced by M7)
[mypy-app.services.library.drive]
disable_error_code = arg-type

[mypy-app.services.team.email_reveal]
disable_error_code = arg-type

[mypy-app.api.routers.library]
disable_error_code = arg-type
