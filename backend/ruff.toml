target-version = "py312"
line-length = 120
src = ["app", "tests"]

[lint]
select = ["E", "F", "I", "W", "UP"]
ignore = [
  "E501",  # line length handled by formatter budget elsewhere
  "UP047",  # TypeVar->type parameter migration is optional; keep existing TypeVar style
]

[lint.per-file-ignores]
"tests/**" = ["E402"]  # conftest env setup before app import
