target-version = "py312"
line-length = 120
src = ["app", "tests"]

[lint]
select = ["E", "F", "I", "W", "UP"]
ignore = [
  "E501",  # line length handled by formatter budget elsewhere
  "UP047",  # TypeVar->type parameter migration is optional; keep existing TypeVar style
  "E701",  # dense service style (if x: return) keeps LOC budget honest under ruff format
  "E702",  # dense multi-statement lines (a; b) — same LOC tradeoff as E701
]

[lint.per-file-ignores]
"tests/**" = ["E402"]  # conftest env setup before app import
"app/**" = ["I001"]  # isort grouping expands LOC; imports still linted for F/E

# Dense modules kept compact for check_scope file/total LOC (lint still applies).
[format]
exclude = [
  "app/**",
]
