# fly.toml app configuration file generated for teamscout-api on 2026-07-10T15:11:09-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'teamscout-api'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile.backend'

[env]
  DATABASE_URL = 'sqlite:////data/teamscout.db'
  ENV = 'prod'
  LOG_LEVEL = 'INFO'

[[mounts]]
  source = 'teamscout_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/livez'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
