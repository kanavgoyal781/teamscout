# TeamScout API — Fly.io
# Operator: set `app` to your unique Fly app name (or pass --app).
# Full runbook: DEPLOYMENT.md

app = "teamscout-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.backend"

[env]
  ENV = "prod"
  LOG_LEVEL = "INFO"
  # SQLite on persistent volume (see [mounts])
  DATABASE_URL = "sqlite:////data/teamscout.db"
  # Uploads co-located under /data/uploads via scripts/docker-entrypoint.sh

[http_service]
  internal_port = 8000
  force_https = true
  # Keep one machine warm: in-memory rate limits + SQLite are single-process.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  # Liveness only (200). Degraded integrations use GET /health → 503;
  # do not fail the machine on readiness-red (matches app.livez_probe).
  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/livez"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Create once: fly volumes create teamscout_data --region iad --size 1
[[mounts]]
  source = "teamscout_data"
  destination = "/data"
